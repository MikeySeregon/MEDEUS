<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Data Studio AI Chat</title>

<style>

body{
	font-family:Arial;
	padding:20px;
	background:#f5f5f5;
}

h2{
	margin-bottom:20px;
}

#messages{
	background:white;
	border:1px solid #ccc;
	border-radius:10px;
	height:500px;
	overflow:auto;
	padding:15px;
	margin-bottom:15px;
}

.message{
	margin-bottom:20px;
}

.user{
	text-align:right;
}

.user .bubble{
	background:#dbeafe;
	color:#000;
	display:inline-block;
	padding:10px 15px;
	border-radius:15px;
	max-width:70%;
}

.bot .bubble{
	background:#dcfce7;
	color:#000;
	display:inline-block;
	padding:10px 15px;
	border-radius:15px;
	max-width:70%;
}

.sql-box{
	background:#111;
	color:#0f0;
	padding:10px;
	border-radius:10px;
	overflow:auto;
	margin-top:10px;
	font-size:12px;
}

#input-area{
	display:flex;
	gap:10px;
}

#question{
	flex:1;
	padding:12px;
	border-radius:10px;
	border:1px solid #ccc;
}

button{
	padding:12px 20px;
	border:none;
	border-radius:10px;
	cursor:pointer;
	background:#2563eb;
	color:white;
}

.loading{
	color:#666;
	font-style:italic;
}

.toggle-sql{
	margin-top:10px;
	cursor:pointer;
	color:#2563eb;
	font-size:14px;
}

</style>
</head>

<body>

<h2>AI Chat</h2>

<div id="messages"></div>

<div id="input-area">

<input
	type="text"
	id="question"
	placeholder="Pregunta algo..."
	onkeydown="handleKey(event)"
/>

<button onclick="sendQuestion()">
	Enviar
</button>

</div>

<script>

function escapeHtml(text) {

	return text
		.replace(/&/g, "&amp;")
		.replace(/</g, "&lt;")
		.replace(/>/g, "&gt;");
}

function handleKey(event){

	if(event.key === "Enter"){
		sendQuestion();
	}
}

async function sendQuestion(){

	const input =
		document.getElementById("question");

	const question =
		input.value.trim();

	if(!question){
		return;
	}

	const messages =
		document.getElementById("messages");

	// ============================
	// USER MESSAGE
	// ============================

	messages.innerHTML += `
		<div class="message user">
			<div class="bubble">
				${escapeHtml(question)}
			</div>
		</div>
	`;

	input.value = "";

	// ============================
	// LOADING
	// ============================

	const loadingId =
		"loading-" + Date.now();

	messages.innerHTML += `
		<div class="message bot" id="${loadingId}">
			<div class="bubble loading">
				Analizando datos...
			</div>
		</div>
	`;

	messages.scrollTop =
		messages.scrollHeight;

	try{

		const response = await fetch(
			"https://opsa-chatbot.go.com.hn/chat", // <- Aún no existe esa extensión.
			{
				method:"POST",
				headers:{
					"Content-Type":"application/json"
				},
				body:JSON.stringify({
					question:question
				})
			}
		);

		const data =
			await response.json();

		// remover loading
		document
			.getElementById(loadingId)
			.remove();

		const sqlId =
			"sql-" + Date.now();

		messages.innerHTML += `
			<div class="message bot">

				<div class="bubble">
					${escapeHtml(data.answer || "Sin respuesta")}
				</div>

				${
					data.sql
					?
					`
					<div
						class="toggle-sql"
						onclick="toggleSQL('${sqlId}')"
					>
						Ver SQL
					</div>

					<div
						id="${sqlId}"
						style="display:none;"
						class="sql-box"
					>
						${escapeHtml(data.sql)}
					</div>
					`
					:
					""
				}

			</div>
		`;

	}catch(error){

		document
			.getElementById(loadingId)
			.remove();

		messages.innerHTML += `
			<div class="message bot">
				<div class="bubble" style="background:#fecaca;">
					Error conectando con el servidor
				</div>
			</div>
		`;
	}

	messages.scrollTop =
		messages.scrollHeight;
}

function toggleSQL(id){

	const el =
		document.getElementById(id);

	if(el.style.display === "none"){
		el.style.display = "block";
	}else{
		el.style.display = "none";
	}
}

</script>

</body>
</html>
