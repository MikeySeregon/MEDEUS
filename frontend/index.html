<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Data Studio AI Chat</title>

<style>
* {
    box-sizing: border-box;
}

body {	
    font-family: Arial, sans-serif;	
    padding: 10px;
    background: #f5f5f5;
    margin: 0;
}

.chat-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 10px;
}

h2 {	
    margin-bottom: 15px;
    font-size: 1.5rem;
}

#messages {	
    background: white;	
    border: 1px solid #ccc;	
    border-radius: 10px;	
    height: calc(100vh - 160px);
    min-height: 200px;
    max-height: 200px;
    overflow-y: auto;	
    padding: 15px;	
    margin-bottom: 15px;
}

.message {	
    margin-bottom: 15px;
}

.user {	
    text-align: right;
}

.bubble {
    display: inline-block;	
    padding: 10px 15px;	
    border-radius: 15px;	
    max-width: 85%;
    word-wrap: break-word;
    font-size: 14px;
}

.bubble table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 13px;
}

.bubble th, .bubble td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: left;
}

.bubble th {
    background: #f3f4f6;
}

.user .bubble {	
    background: #dbeafe;	
    color: #000;	
}

.bot .bubble {	
    background: #dcfce7;	
    color: #000;	
}

#input-area {	
    display: flex;	
    gap: 10px;
}

#question {	
    flex: 1;	
    padding: 12px;	
    border-radius: 10px;	
    border: 1px solid #ccc;
    font-size: 16px;
}

button {	
    padding: 12px 20px;	
    border: none;	
    border-radius: 10px;	
    cursor: pointer;	
    background: #2563eb;	
    color: white;
    font-size: 14px;
    font-weight: bold;
}

.loading {	
    color: #666;	
    font-style: italic;
}

@media (min-width: 600px) {
    body { padding: 20px; }
    .chat-container { padding: 0; }
    .bubble { max-width: 70%; font-size: 15px; }
    h2 { font-size: 1.8rem; }
}
</style>
</head>

<body>

<!--<h2>AI Chat</h2>-->

<div id="messages"></div>

<div id="input-area">

<input
	type="text"
	id="question"
	placeholder="Pregunta algo..."
	onkeydown="handleKey(event)"
/>

<button onclick="sendQuestion()">
	Enviar
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script>

if (window.top === window.self)
{
    document.body.innerHTML = "Acceso no permitido";

    throw new Error();
}
const ref = document.referrer || "";

if (!ref.startsWith("https://lookerstudio.google.com") && !ref.startsWith("https://datastudio.google.com"))
{
    document.body.innerHTML =
        "Acceso no permitido";

    throw new Error();
}

const params = new URLSearchParams(window.location.search);

const domain = params.get("domain") || "telco";

function escapeHtml(text) {

	return text
		.replace(/&/g, "&amp;")
		.replace(/</g, "&lt;")
		.replace(/>/g, "&gt;");
}

function handleKey(event){

	if(event.key === "Enter")
	{
		sendQuestion();
	}
}

async function sendQuestion(){

	const input =
		document.getElementById("question");

	const question =
		input.value.trim();

	if(!question){
		return;
	}

	const messages =
		document.getElementById("messages");

	// ============================
	// USER MESSAGE
	// ============================

	messages.innerHTML += `
		<div class="message user">
			<div class="bubble">
				${escapeHtml(question)}
			</div>
		</div>
	`;

	input.value = "";

	// ============================
	// LOADING
	// ============================

	const loadingId =
		"loading-" + Date.now();

	messages.innerHTML += `
		<div class="message bot" id="${loadingId}">
			<div class="bubble loading">
				Analizando datos...
			</div>
		</div>
	`;

	messages.scrollTop =
		messages.scrollHeight;

	try{

		const response = await fetch(
			`/chat/${domain}`,
			{
				method:"POST",
				headers:{
					"Content-Type":"application/json"
				},
				body:JSON.stringify({
					question:question,
					session_id: sessionId
				})
			}
		);

		const data =
			await response.json();

		// remover loading
		document
			.getElementById(loadingId)
			.remove();

		const html = DOMPurify.sanitize(
			marked.parse(data.answer || "Sin respuesta")
		);

		messages.innerHTML += `
			<div class="message bot">

				<div class="bubble">
					${html}
				</div>

			</div>
		`;

	}catch(error){

		document
			.getElementById(loadingId)
			.remove();

		messages.innerHTML += `
			<div class="message bot">
				<div class="bubble" style="background:#fecaca;">
					Error conectando con el servidor
				</div>
			</div>
		`;
	}

	messages.scrollTop =
		messages.scrollHeight;
}

let sessionId = localStorage.getItem("session_id");

if (!sessionId) {
	sessionId = crypto.randomUUID();
	localStorage.setItem("session_id", sessionId);
}

async function loadHistory() {

    const res = await fetch(
        `/chat/${domain}/history?session_id=${sessionId}`
    );

    const data = await res.json();

    const messages = document.getElementById("messages");

    data.messages.forEach(msg => {

        const className =
            msg.role === "user" ? "user" : "bot";

        const content =
            msg.role === "assistant"
                ? DOMPurify.sanitize(marked.parse(msg.content))
                : escapeHtml(msg.content);

        messages.innerHTML += `
            <div class="message ${className}">
                <div class="bubble">${content}</div>
            </div>
        `;
    });

    messages.scrollTop = messages.scrollHeight;
}

window.onload = () => {
    loadHistory();
};

</script>

</body>
</html>
